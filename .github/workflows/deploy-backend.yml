name: Deploy Backend

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main, develop, test]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [ dev, test, prod ]
      image_tag:
        description: 'Docker image tag (leave empty for auto)'
        required: false
        default: ''

env:
  AWS_REGION: us-east-2

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Resolve environment config
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            SHA="${GITHUB_SHA}"
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            if [ "$BRANCH" = "main" ]; then
              ENV="prod"
            elif [ "$BRANCH" = "test" ]; then
              ENV="test"
            else
              ENV="dev"
            fi
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi

          if [ "$ENV" = "prod" ]; then
            APP="btl-transport"
          else
            APP="btl-transport-$ENV"
          fi

          echo "env=$ENV"        >> $GITHUB_OUTPUT
          echo "app=$APP"        >> $GITHUB_OUTPUT
          echo "sha=${SHA:0:7}"  >> $GITHUB_OUTPUT

      - name: Compute semantic version
        id: semver
        if: steps.cfg.outputs.env == 'prod' && github.event.inputs.image_tag == ''
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Resolve image tag
        id: image_tag
        run: |
          MANUAL="${{ github.event.inputs.image_tag }}"
          SEMVER="${{ steps.semver.outputs.new_version }}"
          SHA="${{ steps.cfg.outputs.sha }}"

          if [ -n "$MANUAL" ]; then
            echo "value=$MANUAL" >> $GITHUB_OUTPUT
          elif [ -n "$SEMVER" ]; then
            echo "value=$SEMVER" >> $GITHUB_OUTPUT
          else
            echo "value=$SHA" >> $GITHUB_OUTPUT
          fi

      - name: Set AWS role ARN
        run: |
          case "${{ steps.cfg.outputs.env }}" in
            prod) echo "AWS_ROLE_ARN=${{ secrets.PROD_AWS_ROLE_ARN }}" >> $GITHUB_ENV ;;
            test) echo "AWS_ROLE_ARN=${{ secrets.TEST_AWS_ROLE_ARN }}" >> $GITHUB_ENV ;;
            *)    echo "AWS_ROLE_ARN=${{ secrets.DEV_AWS_ROLE_ARN }}"  >> $GITHUB_ENV ;;
          esac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image_tag.outputs.value }}
          APP: ${{ steps.cfg.outputs.app }}
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$APP:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$APP:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$APP:$IMAGE_TAG $ECR_REGISTRY/$APP:latest
          docker push $ECR_REGISTRY/$APP:latest
          echo "image=$ECR_REGISTRY/$APP:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        env:
          APP: ${{ steps.cfg.outputs.app }}
        run: |
          aws ecs describe-task-definition \
            --task-definition $APP \
            --query taskDefinition > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ steps.cfg.outputs.app }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ steps.cfg.outputs.app }}-service
          cluster: ${{ steps.cfg.outputs.app }}-cluster
          wait-for-service-stability: true

      - name: Deployment summary
        run: |
          echo "## Deployed to ${{ steps.cfg.outputs.env }} ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ steps.build-image.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.image_tag.outputs.value }}" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster:** ${{ steps.cfg.outputs.app }}-cluster" >> $GITHUB_STEP_SUMMARY
